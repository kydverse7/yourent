name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: lint-type-check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit --if-present

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-type-check
    env:
      # Variables minimales pour que le build ne crashe pas
      NEXTAUTH_SECRET: ci-secret-placeholder-32-chars-xx
      NEXTAUTH_URL: http://localhost:3000
      MONGODB_URI: mongodb://localhost:27017/yourent_ci
      UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
      UPSTASH_REDIS_REST_TOKEN: placeholder
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: placeholder
      CLOUDINARY_API_KEY: placeholder
      CLOUDINARY_API_SECRET: placeholder
      RESEND_API_KEY: re_placeholder
      RESEND_FROM: noreply@yourent.ma
      TWILIO_ACCOUNT_SID: ACplaceholder
      TWILIO_AUTH_TOKEN: placeholder
      TWILIO_PHONE_FROM: "+212600000000"
      TWILIO_WHATSAPP_FROM: "whatsapp:+14155238886"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
